<script>
// ... (كل السكربتات السابقة الخاصة بك) ...

// الدالة الجديدة للمتفقد الذكي
async function inspectLesson() {
  if (!curLesson) {
    alert("يرجى إنشاء أو فتح جذاذة أولاً لتحليلها.");
    return;
  }

  alert("جاري إرسال الجذاذة إلى المتفقد الذكي للتحليل...");

  try {
    // هذا الرابط يجب أن يؤدي إلى ملف inspector_proxy.js على خادمك
    const response = await fetch('https://YOUR-VERCEL-URL.vercel.app/api/inspector', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lesson: curLesson.data })
    });

    const report = await response.json();
    console.log("تقرير المتفقد:", report);
    
    // يمكنك هنا عرض التقرير في نافذة منبثقة أو صفحة جديدة
    alert("تم التحليل! التقرير جاهز في المتصفح (Console).");
  } catch (error) {
    console.error("خطأ في الاتصال بالمتفقد:", error);
    alert("حدث خطأ أثناء الاتصال بالمتفقد الذكي.");
  }
}

// ... (بقية السكربتات الخاصة بك) ...
</script>
